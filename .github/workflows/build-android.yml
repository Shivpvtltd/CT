name: Build DNSGuard Android

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (apk / aab / both)'
        required: true
        default: 'both'
        type: choice
        options:
          - apk
          - aab
          - both

env:
  FLUTTER_VERSION: '3.19.6'
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────
  # 1. Run Tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

  # ─────────────────────────────────────────
  # 2. Build APK (debug - always)
  # ─────────────────────────────────────────
  build-apk-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --split-per-abi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dnsguard-debug-apk
          path: build/app/outputs/flutter-apk/app-*-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────
  # 3. Build Release APK + AAB (on push to main or tag)
  # ─────────────────────────────────────────
  build-release:
    name: 🚀 Build Release
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # ── Keystore Setup ──
      - name: Decode & setup keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # ── Build Release APK ──
      - name: Build release APK (split per ABI)
        if: |
          github.event.inputs.build_type == 'apk' ||
          github.event.inputs.build_type == 'both' ||
          github.event.inputs.build_type == ''
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1) \
            --build-number=${{ github.run_number }}

      - name: Build universal release APK
        if: |
          github.event.inputs.build_type == 'apk' ||
          github.event.inputs.build_type == 'both' ||
          github.event.inputs.build_type == ''
        run: |
          flutter build apk --release \
            --build-name=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1) \
            --build-number=${{ github.run_number }}

      # ── Build Release AAB ──
      - name: Build release AAB (Play Store)
        if: |
          github.event.inputs.build_type == 'aab' ||
          github.event.inputs.build_type == 'both' ||
          github.event.inputs.build_type == ''
        run: |
          flutter build appbundle --release \
            --build-name=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1) \
            --build-number=${{ github.run_number }}

      # ── Rename outputs with version ──
      - name: Rename artifacts
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          BUILD=${{ github.run_number }}
          mkdir -p artifacts

          # APKs
          if ls build/app/outputs/flutter-apk/app-arm64-v8a-release.apk 2>/dev/null; then
            cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
               artifacts/DNSGuard-v${VERSION}-${BUILD}-arm64.apk
          fi
          if ls build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk 2>/dev/null; then
            cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
               artifacts/DNSGuard-v${VERSION}-${BUILD}-arm32.apk
          fi
          if ls build/app/outputs/flutter-apk/app-release.apk 2>/dev/null; then
            cp build/app/outputs/flutter-apk/app-release.apk \
               artifacts/DNSGuard-v${VERSION}-${BUILD}-universal.apk
          fi

          # AAB
          if ls build/app/outputs/bundle/release/app-release.aab 2>/dev/null; then
            cp build/app/outputs/bundle/release/app-release.aab \
               artifacts/DNSGuard-v${VERSION}-${BUILD}.aab
          fi

      # ── Upload artifacts ──
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: dnsguard-release-apk-${{ github.run_number }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: dnsguard-release-aab-${{ github.run_number }}
          path: artifacts/*.aab
          retention-days: 30

      # ── GitHub Release on tag ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.apk
            artifacts/*.aab
          generate_release_notes: true
          body: |
            ## DNSGuard ${{ github.ref_name }}

            ### 📥 Downloads
            | File | Description |
            |------|-------------|
            | `*-arm64.apk` | For most modern Android phones (recommended) |
            | `*-arm32.apk` | For older 32-bit Android devices |
            | `*-universal.apk` | Works on all devices (larger size) |
            | `*.aab` | Android App Bundle for Play Store |

            ### 🛡️ What's included
            - One-tap DNS-based ad protection
            - 6-hour session system
            - 4 DNS providers: AdGuard, NextDNS, Control D, Alternate DNS
            - Quick Settings Tile
            - Dark & Light mode

            > Blocks most ads. Some apps may require ads to function.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
