name: dnsguard
description: DNSGuard - Premium Ad Protection via Secure DNS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Storage & Persistence
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # DNS / Network
  connectivity_plus: ^5.0.2

  # Background & Notifications
  flutter_local_notifications: ^16.3.0
  workmanager: ^0.5.2

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  google_fonts: ^6.1.0

  # Quick Settings Tile (Android)
  quick_actions: ^1.0.6

  # In-app Update
  in_app_update: ^4.2.3

  # Utils
  intl: ^0.19.0
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.4
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
